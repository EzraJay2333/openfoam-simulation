workflow:
  name: "porous-density-topology"
  status: experimental
  distribution:
    - "openfoam.com:2312"  # Native topology support verified from OpenCFD v2312
  problem_fingerprint:
    flow_regime: [steady, incompressible]
    physics: [single_phase, isothermal]
    geometry_class: [internal]
    spatial_dimensions: [2d_planar, 2d_axisymmetric, 3d]
    optimisation_family: [density_topology]
    objectives: [pressure_loss, uniformity]
    constraints: [volume]
    design_variables: [porosity_field]
  support_level: native
  prerequisites:
    - "adjointOptimisationFoam (OpenCFD v2312+)"
    - "Helmholtz filter PDE solver (built-in)"
    - "Python 3 with numpy, matplotlib for post-processing"
  alternative:
    distribution: "openfoam.org"
    support_level: external
    description: "Use porousSimpleFoam + external optimizer (SciPy/pyOptSparse/DAKOTA)"
    caveat: "Requires manual gradient computation or finite differences; slower convergence"
  unsupported_profiles:
    - profile: conjugate_heat_transfer_topology
      support_level: external
      reason: "This native template is mono-fluid and isothermal; use a thermal primal plus an external optimiser or a custom thermal adjoint"
    - profile: pareto_multi_objective
      support_level: external
      reason: "Use a verified multi-objective driver; scalar objective composition is not a Pareto front"
  steps:
    - stage: environment
      description: "Verify adjointOptimisationFoam supports porosity design variables (-help)"
    - stage: mesh
      description: "Generate uniform blockMesh for full design domain"
    - stage: initialization
      description: "Set the design field to the installed tutorial's all-fluid value; do not assume the zero/one convention"
    - stage: case_setup
      description: "Configure adjointDict with porosity design variables, Brinkman penalty, Helmholtz filter"
    - stage: smoke_run
      description: "Few iterations with the verified uniform all-fluid design value to verify setup"
    - stage: sensitivity_test
      description: "One adjoint solve to verify sensitivity computation"
    - stage: optimize
      description: "Full topology optimisation loop (50-200 design iterations)"
    - stage: postprocess
      description: "Extract final α field, velocity field, pressure field; visualize optimized topology"
    - stage: validate
      description: "Check volume constraint, objective reduction, binary interface quality"
  known_issues:
    - "Gray regions (α≈0.5) persist if Heaviside sharpness is too low"
    - "Checkerboard patterns if filter radius < 2× cell size"
    - "Solver instability if permeability approaches zero in solid regions"
    - "Foundation distribution requires external optimizer — NOT a drop-in replacement"
  references:
    - "OpenCFD adjointOptimisationFoam documentation (v2312+)"
    - "Borrvall & Petersson (2003) - Topology optimization of fluids in Stokes flow"
    - "Gersborg-Hansen et al. (2005) - Topology optimization of Navier-Stokes flow"
    - "Papoutsis-Kiachagias & Giannakoglou (2016) - Continuous adjoint for fluid topology optimization"
