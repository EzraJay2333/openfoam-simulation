workflow:
  name: "duct-shape-optimization"
  status: experimental
  distribution:
    - "openfoam.org:10"
    - "openfoam.com:2206"
  problem_fingerprint:
    flow_regime: [steady, incompressible]
    physics: [single_phase, isothermal]
    geometry_class: [internal]
    spatial_dimensions: [2d_planar, 2d_axisymmetric, 3d]
    optimisation_family: [shape]
    objectives: [pressure_loss, uniformity]
    constraints: [volume]
    design_variables: [boundary_displacement]
  support_level: unverified
  prerequisites:
    - "OpenCFD v1906+ adjointOptimisationFoam with exact-version boundary-displacement tutorial/source evidence"
    - "Foundation solver accepted only when the installed source/tutorial proves boundary-displacement design variables; Foundation 13 legacy blockage optimisation does not qualify"
    - "blockMesh with grading for near-wall refinement"
  steps:
    - stage: environment
      description: "Verify adjoint solver availability; note turbulence limitation"
    - stage: mesh
      description: "Generate graded blockMesh with refinement at bend and near walls"
    - stage: primal
      description: "Converge primal flow field"
    - stage: adjoint
      description: "Compute surface sensitivities for weighted cost function"
    - stage: morph
      description: "Morph wall boundaries using sensitivity-weighted displacement"
    - stage: iterate
      description: "Loop primal→adjoint→morph until objective change < 1e-4"
    - stage: validate
      description: "Compare pressure loss, flow uniformity vs baseline"
  known_issues:
    - "Mesh morphing may produce negative volumes in tight bends"
    - "Foundation capability is release-specific; Foundation 13 legacy blockage optimisation is not valid for this boundary-displacement workflow"
    - "Curvature regularization may be needed for manufacturable shapes"
  references:
    - "Giannakoglou et al. (2006) - Adjoint methods for duct shape optimization"
    - "Installed, exact-version shape-optimisation tutorial selected during the documentation gate"
