<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 模型边界条件选择器</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --danger: #f85149;
    --success: #3fb950;
    --warning: #d2991d;
    --purple: #a371f7;
    --inlet: #58a6ff;
    --outlet: #f85149;
    --wall: #8b949e;
    --heat: #d2991d;
    --symmetry: #a371f7;
    --open: #3fb950;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh; width: 100vw;
    display: flex; overflow: hidden;
  }

  /* ── 3D Viewer ── */
  #viewer {
    flex: 1; position: relative;
    background: radial-gradient(ellipse at center, #1a1f35 0%, #0a0d14 100%);
  }
  #viewer canvas { display: block; }

  .viewer-overlay {
    position: absolute; z-index: 10; pointer-events: none;
  }
  #stats {
    top: 16px; left: 16px;
    background: rgba(13,17,23,0.85); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 16px; font-size: 12px;
    line-height: 1.6; min-width: 180px;
  }
  #stats .val { color: var(--accent); font-weight: 600; }
  #stats .dim { color: var(--text-dim); font-size: 11px; }

  #tooltip {
    top: 0; left: 0;
    background: rgba(22,27,34,0.95); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px;
    font-size: 12px; display: none;
  }

  .viewer-controls {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; z-index: 10;
  }
  .viewer-controls button {
    background: rgba(13,17,23,0.85); backdrop-filter: blur(8px);
    border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer;
    transition: all 0.15s;
  }
  .viewer-controls button:hover { color: var(--text); border-color: var(--accent); }
  .viewer-controls button.active { color: var(--accent); border-color: var(--accent); background: rgba(88,166,255,0.1); }

  .view-hint {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: var(--text-dim); pointer-events: none; z-index: 10;
  }

  /* ── Panel ── */
  #panel {
    width: 400px; background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    transition: width 0.2s;
  }
  #panel.collapsed { width: 48px; }
  #panel.collapsed #panel-inner { display: none; }

  #panel-toggle {
    position: absolute; right: 400px; top: 12px; z-index: 20;
    width: 32px; height: 32px; border-radius: 6px 0 0 6px;
    background: var(--surface); border: 1px solid var(--border); border-right: none;
    color: var(--text-dim); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #panel-toggle:hover { color: var(--text); }

  #panel-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    font-size: 15px; font-weight: 600;
    display: flex; align-items: center; gap: 10px;
  }
  #panel-header .dot { width: 8px; height: 8px; border-radius: 50%; }
  #panel-header .dot.connected { background: var(--success); }
  #panel-header .dot.idle { background: var(--text-dim); }

  #panel-scroll {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 18px;
  }

  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* Upload Zone */
  #dropzone {
    border: 2px dashed var(--border); border-radius: 10px;
    padding: 28px; text-align: center; cursor: pointer;
    transition: all 0.2s;
  }
  #dropzone:hover, #dropzone.drag { border-color: var(--accent); background: rgba(88,166,255,0.04); }
  #dropzone .icon { font-size: 36px; margin-bottom: 8px; opacity: 0.7; }
  #dropzone p { font-size: 13px; color: var(--text-dim); }
  #dropzone .supported { font-size: 11px; color: var(--text-dim); opacity: 0.6; margin-top: 6px; }
  #dropzone input { display: none; }
  #dropzone .filename { color: var(--accent); font-size: 13px; margin-top: 6px; display: none; }

  /* Loading */
  .loading { display: none; align-items: center; gap: 10px; padding: 12px; font-size: 13px; color: var(--text-dim); }
  .loading.active { display: flex; }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Face list */
  #face-search {
    width: 100%; padding: 8px 12px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 12px;
    outline: none;
  }
  #face-search:focus { border-color: var(--accent); }
  #face-search::placeholder { color: var(--text-dim); }

  #face-list {
    max-height: 260px; overflow-y: auto;
    border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg);
  }
  #face-list .empty {
    padding: 24px; text-align: center; font-size: 12px; color: var(--text-dim);
  }

  .face-row {
    display: flex; align-items: center; gap: 8px; padding: 7px 10px;
    cursor: pointer; transition: background 0.1s;
    border-bottom: 1px solid rgba(48,54,61,0.5); font-size: 12px;
  }
  .face-row:last-child { border-bottom: none; }
  .face-row:hover { background: rgba(88,166,255,0.06); }
  .face-row.selected { background: rgba(63,185,80,0.1); border-left: 3px solid var(--success); padding-left: 7px; }
  .face-row .swatch {
    width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .face-row .id { font-weight: 600; width: 26px; flex-shrink: 0; color: var(--text-dim); }
  .face-row .info { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .face-row .area { color: var(--text-dim); font-size: 11px; flex-shrink: 0; }
  .face-row .badge {
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
    background: var(--border); flex-shrink: 0;
    color: var(--text-dim);
  }

  /* Boundary form */
  #boundary-form {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px; display: none;
  }
  #boundary-form.active { display: block; }

  #selected-label {
    font-size: 12px; color: var(--text-dim); margin-bottom: 10px; display: none;
  }
  #selected-label.active { display: block; }

  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .form-row:last-child { margin-bottom: 0; }

  select, input[type="text"] {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; color: var(--text);
    font-size: 12px; outline: none;
  }
  select:focus, input:focus { border-color: var(--accent); }
  select { flex: 1; }
  input[type="text"] { flex: 2; }

  .btn {
    padding: 7px 14px; border-radius: 6px; border: 1px solid transparent;
    font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .btn-pri { background: var(--accent); color: #fff; }
  .btn-pri:hover { background: #4090e0; }
  .btn-sec { background: var(--bg); border-color: var(--border); color: var(--text); }
  .btn-sec:hover { border-color: var(--accent); }
  .btn-danger { background: transparent; border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: rgba(248,81,73,0.1); }
  .btn-success { background: var(--success); color: #000; }
  .btn-success:hover { background: #35a044; }

  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }

  /* Assigned list */
  #assigned-list { font-size: 12px; }
  #assigned-list .empty { color: var(--text-dim); padding: 8px 0; }

  .bnd-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    border-bottom: 1px solid var(--border); font-size: 12px;
    background: var(--bg); border-radius: 4px; margin-bottom: 4px;
  }
  .bnd-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .bnd-item .info { flex: 1; }
  .bnd-item .remove {
    color: var(--text-dim); cursor: pointer; padding: 2px 6px;
    border-radius: 3px; font-size: 14px;
  }
  .bnd-item .remove:hover { color: var(--danger); background: rgba(248,81,73,0.1); }

  /* Export */
  #export-json {
    display: none; background: #0a0d14; border: 1px solid var(--border);
    border-radius: 6px; padding: 14px; font-family: 'SF Mono', 'Consolas', monospace;
    font-size: 11px; max-height: 200px; overflow: auto;
    white-space: pre-wrap; color: #7ee787; line-height: 1.5;
  }

  /* Model list items */
  .model-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-bottom: 1px solid var(--border); font-size: 12px;
    background: var(--bg); border-radius: 4px; margin-bottom: 4px;
    cursor: pointer; transition: background 0.15s;
  }
  .model-item:hover { background: rgba(88,166,255,0.08); }
  .model-item.active { border-left: 3px solid var(--accent); background: rgba(88,166,255,0.06); }
  .model-item .info { flex: 1; min-width: 0; }
  .model-item .name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .model-item .meta { font-size: 11px; color: var(--text-dim); }
  .model-item .btn-del {
    padding: 3px 8px; border-radius: 4px; border: 1px solid var(--danger);
    color: var(--danger); background: transparent; font-size: 11px;
    cursor: pointer; flex-shrink: 0; white-space: nowrap;
  }
  .model-item .btn-del:hover { background: rgba(248,81,73,0.1); }

  /* Toast */
  #toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 20px; font-size: 13px;
    z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  #toast.show { opacity: 1; }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error { border-color: var(--danger); color: var(--danger); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }
</style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- 3D Viewer -->
<div id="viewer">
  <div id="stats" class="viewer-overlay">
    <div style="color:var(--text-dim);">模型信息</div>
    <div>三角面: <span id="stat-faces" class="val">--</span></div>
    <div>面组: <span id="stat-groups" class="val">--</span></div>
    <div>尺寸: <span id="stat-size" class="dim">--</span></div>
  </div>
  <div id="tooltip" class="viewer-overlay"></div>
  <div class="viewer-controls">
    <button onclick="setView('front')" title="Front">Front</button>
    <button onclick="setView('back')" title="Back">Back</button>
    <button onclick="setView('top')" title="Top">Top</button>
    <button onclick="setView('bottom')" title="Bottom">Bottom</button>
    <button onclick="setView('left')" title="Left">Left</button>
    <button onclick="setView('right')" title="Right">Right</button>
    <button onclick="setView('iso')" title="Isometric">Iso</button>
  </div>
  <div class="view-hint">🖱 拖拽旋转 &bull; 滚轮缩放 &bull; 右键平移 &bull; 点击选择面</div>
</div>

<!-- Panel Toggle -->
<button id="panel-toggle" onclick="togglePanel()" title="Toggle Panel">☰</button>

<!-- Panel -->
<div id="panel">
  <div id="panel-header">
    <span class="dot connected" id="status-dot"></span>
    <span>边界条件配置</span>
  </div>

  <div id="panel-scroll">

    <!-- Loaded Models -->
    <div class="section-label">已加载模型</div>
    <div id="model-list" style="font-size:12px;">
      <div class="empty">暂无已加载的模型</div>
    </div>

    <!-- Upload -->
    <div class="section-label">导入新模型</div>
    <div id="dropzone">
      <div class="icon">📦</div>
      <p>点击或拖拽上传模型文件</p>
      <span class="filename" id="filename"></span>
      <div class="supported">STP &bull; STEP &bull; STL &bull; OBJ &bull; GLB &bull; GLTF</div>
      <input type="file" id="file-input" accept=".stp,.step,.stl,.obj,.glb,.gltf,.ply">
    </div>
    <div class="loading" id="loading"><div class="spinner"></div>正在解析模型...</div>

    <!-- Faces -->
    <div class="section-label">面组列表</div>
    <input type="text" id="face-search" placeholder="搜索面 ID、类型或面积..." disabled>
    <div id="face-list"><div class="empty">请先上传模型文件</div></div>

    <!-- Boundary assignment -->
    <div class="section-label">分配边界条件</div>
    <div id="selected-label"></div>
    <div id="boundary-form">
      <div class="form-row">
        <select id="bnd-type">
          <option value="inlet">🚀 入口 (Inlet)</option>
          <option value="outlet">💨 出口 (Outlet)</option>
          <option value="wall">🧱 壁面 (Wall)</option>
          <option value="heat_source">🔥 热源 (Heat Source)</option>
          <option value="symmetry">🪞 对称面 (Symmetry)</option>
          <option value="open">🌐 开放边界 (Open)</option>
        </select>
        <input type="text" id="bnd-label" placeholder="自定义标签（可选）">
      </div>
      <div class="btn-row">
        <button class="btn btn-pri" onclick="applyBoundary()">应用到选中面</button>
        <button class="btn btn-sec" onclick="clearSelection()">清除选择</button>
      </div>
    </div>

    <!-- Assigned -->
    <div class="section-label">已分配的边界</div>
    <div id="assigned-list"><div class="empty">尚未分配边界条件</div></div>

    <!-- Export -->
    <div class="section-label">导出配置</div>
    <div class="btn-row">
      <button class="btn btn-success" onclick="exportConfig()">导出 JSON 配置</button>
      <button class="btn btn-danger" onclick="resetAll()">重置全部</button>
    </div>
    <pre id="export-json"></pre>

  </div>
</div>

<script type="importmap">
{ "imports": {
  "three": "/static/vendor/three.module.js",
  "three/addons/controls/OrbitControls.js": "/static/vendor/OrbitControls.js",
  "three/addons/loaders/GLTFLoader.js": "/static/vendor/GLTFLoader.js"

</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ═══════════════════ State ═══════════════════
const S = {
  modelId: null,
  faceGroups: [],
  selectedFaces: new Set(),       // Set<faceId>
  boundaries: {},                 // { faceId: {type, label} }
  modelMesh: null,                // The rendered mesh
  highlightMeshes: [],            // Highlight overlay meshes
  viewMode: 'solid',
};

// ═══════════════════ Three.js Setup ═══════════════════
const container = document.getElementById('viewer');
const scene = new THREE.Scene();

// Gradient background
const bgCanvas = document.createElement('canvas'); bgCanvas.width = 2; bgCanvas.height = 512;
const bgCtx = bgCanvas.getContext('2d');
const grad = bgCtx.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0, '#1a2150'); grad.addColorStop(0.5, '#0d1225'); grad.addColorStop(1, '#0a0d14');
bgCtx.fillStyle = grad; bgCtx.fillRect(0, 0, 2, 512);
const bgTex = new THREE.CanvasTexture(bgCanvas);
scene.background = bgTex;
scene.fog = new THREE.Fog(0x0d1225, 15, 80);

const camera = new THREE.PerspectiveCamera(45, 2, 0.1, 200);
camera.position.set(6, 4, 6);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0x334466, 1.5);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0xffeedd, 4);
keyLight.position.set(8, 12, 8);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 60;
keyLight.shadow.camera.left = -15; keyLight.shadow.camera.right = 15;
keyLight.shadow.camera.top = 15; keyLight.shadow.camera.bottom = -15;
keyLight.shadow.bias = -0.0001;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8899cc, 1.5);
fillLight.position.set(-3, 2, -4);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 1);
rimLight.position.set(0, -1, 5);
scene.add(rimLight);

// Ground plane with shadow
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.ShadowMaterial({ opacity: 0.25 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid
const gridHelper = new THREE.PolarGridHelper(8, 32, 24, 64, 0x334466, 0x223355);
scene.add(gridHelper);

// Model group
const modelGroup = new THREE.Group();
scene.add(modelGroup);

// Orbit controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.01;
controls.maxDistance = 100;
controls.zoomSpeed = 1.5;
controls.target.set(0, 0, 0);
controls.update();

// ═══════════════════ Raycaster ═══════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// ═══════════════════ Resize ═══════════════════
function resize() {
  const rect = container.getBoundingClientRect();
  renderer.setSize(rect.width, rect.height);
  camera.aspect = rect.width / Math.max(1, rect.height);
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════ Render Loop ═══════════════════
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ═══════════════════ Model Loading ═══════════════════
async function loadModel(glbUrl, modelId, faceGroups) {
  // Clear previous model
  while (modelGroup.children.length > 0) {
    const child = modelGroup.children[0];
    disposeMesh(child);
    modelGroup.remove(child);
  }
  S.modelMesh = null;
  S.modelMeshes = [];       // All model meshes for raycasting
  S.highlightMeshes = [];
  S.modelId = modelId;
  S.faceGroups = faceGroups;
  S.selectedFaces.clear();
  S.boundaries = {};

  try {
    const loader = new GLTFLoader();
    const gltf = await loader.loadAsync(glbUrl);

    // Build face group map from ALL meshes
    // Each mesh keeps its own geometry; we map faceGroupMap per mesh
    const allMeshes = [];
    let totalTriangles = 0;
    const hasVertexColors = [];  // track if mesh has color data

    gltf.scene.traverse((child) => {
      if (child.isMesh && child.geometry) {
        const geom = child.geometry;
        // Ensure normals exist
        if (!geom.getAttribute('normal')) {
          geom.computeVertexNormals();
        }

        const hasColor = geom.getAttribute('color') !== undefined;
        hasVertexColors.push(hasColor);

        // Build face group map for this mesh
        const fgMap = buildFaceGroupMap(geom, faceGroups);
        geom.userData = { faceGroupMap: fgMap };

        const mat = new THREE.MeshStandardMaterial({
          vertexColors: hasColor,
          color: hasColor ? 0xffffff : 0x8899aa,
          roughness: 0.5,
          metalness: 0.08,
          side: THREE.DoubleSide,
          flatShading: false,
        });

        // Apply world matrix for positioned meshes
        geom.applyMatrix4(child.matrixWorld);

        const mesh = new THREE.Mesh(geom, mat);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData.isModel = true;

        modelGroup.add(mesh);
        allMeshes.push(mesh);

        const fc = geom.index ? geom.index.count / 3 : geom.getAttribute('position').count / 3;
        totalTriangles += fc;
      }
    });

    if (allMeshes.length === 0) {
      toast('模型中未找到几何数据', 'error');
      return;
    }

    S.modelMeshes = allMeshes;
    // Primary model mesh for convenience
    S.modelMesh = allMeshes[0];
    S.totalTriangles = totalTriangles;
    S.hasVertexColors = hasVertexColors.some(v => v);

    // Compute combined bounding box
    const box = new THREE.Box3();
    for (const m of allMeshes) {
      box.expandByObject(m);
    }
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);

    // Update ground
    ground.position.copy(center);
    ground.position.y = box.min.y - 0.02;
    ground.scale.set(Math.max(maxDim * 1.5, 10), Math.max(maxDim * 1.5, 10), 1);

    // Position camera
    const dist = maxDim * 2.0;
    camera.position.set(center.x + dist * 0.7, center.y + dist * 0.5, center.z + dist * 0.7);
    controls.target.copy(center);
    controls.update();

    // Update UI
    updateStats(box, size, faceGroups.length);
    updateFaceList();
    updateAssignedList();
    toast(`加载成功: ${faceGroups.length} 个面组, ${totalTriangles.toLocaleString()} 个三角面`, 'success');

  } catch (err) {
    console.error('Load error:', err);
    toast('模型加载失败: ' + err.message, 'error');
  }
}

function mergeBufferGeometries(geos) {
  const merged = new THREE.BufferGeometry();
  let totalVerts = 0, totalIdx = 0;
  for (const g of geos) {
    totalVerts += g.getAttribute('position').count;
    totalIdx += g.index ? g.index.count : g.getAttribute('position').count;
  }

  const positions = new Float32Array(totalVerts * 3);
  const normals = new Float32Array(totalVerts * 3);
  const colors = new Float32Array(totalVerts * 3);
  const indices = new Uint32Array(totalIdx);

  let vertOff = 0, idxOff = 0, vertBase = 0;
  for (const g of geos) {
    const pos = g.getAttribute('position');
    const nrm = g.getAttribute('normal');
    const col = g.getAttribute('color');

    positions.set(pos.array, vertOff * 3);
    if (nrm) normals.set(nrm.array, vertOff * 3);

    if (col) {
      colors.set(col.array, vertOff * 3);
    } else {
      // Default gray
      for (let i = 0; i < pos.count; i++) {
        colors[(vertOff + i) * 3] = 0.6;
        colors[(vertOff + i) * 3 + 1] = 0.6;
        colors[(vertOff + i) * 3 + 2] = 0.6;
      }
    }

    if (g.index) {
      for (let i = 0; i < g.index.count; i++) {
        indices[idxOff + i] = g.index.getX(i) + vertBase;
      }
      idxOff += g.index.count;
    } else {
      for (let i = 0; i < pos.count; i++) {
        indices[idxOff + i] = vertBase + i;
      }
      idxOff += pos.count;
    }

    vertBase += pos.count;
    vertOff += pos.count;
  }

  merged.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  merged.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
  merged.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  merged.setIndex(new THREE.BufferAttribute(indices, 1));
  merged.computeVertexNormals();
  return merged;
}

function buildFaceGroupMap(geometry, faceGroups) {
  const colorAttr = geometry.getAttribute('color');
  const indexAttr = geometry.index;
  const faceCount = indexAttr ? indexAttr.count / 3 : geometry.getAttribute('position').count / 3;

  if (!colorAttr) {
    // No color data: assign all faces to group 0
    return new Array(faceCount).fill(0);
  }

  // Precompute face group colors
  const groupColors = faceGroups.map(fg => getFaceColor(fg.face_id, faceGroups.length));

  const map = new Array(faceCount);
  for (let i = 0; i < faceCount; i++) {
    const i0 = indexAttr ? indexAttr.getX(i * 3) : i * 3;
    const r = Math.round(colorAttr.getX(i0) * 255);
    const g = Math.round(colorAttr.getY(i0) * 255);
    const b = Math.round(colorAttr.getZ(i0) * 255);
    map[i] = findClosestFaceGroup(r, g, b, groupColors);
  }
  return map;
}

function findClosestFaceGroup(r, g, b, groupColors) {
  let best = 0, bestDist = Infinity;
  for (let i = 0; i < groupColors.length; i++) {
    const [cr, cg, cb] = groupColors[i];
    const dist = (r - cr) ** 2 + (g - cg) ** 2 + (b - cb) ** 2;
    if (dist < bestDist) { bestDist = dist; best = i; }
  }
  return best;
}

function getFaceColor(faceId, total) {
  const hue = faceId / Math.max(1, total);
  const r = Math.round(255 * (0.5 + 0.5 * Math.sin(2 * Math.PI * hue)));
  const g = Math.round(255 * (0.5 + 0.5 * Math.sin(2 * Math.PI * hue + 2.094)));
  const b = Math.round(255 * (0.5 + 0.5 * Math.sin(2 * Math.PI * hue + 4.189)));
  return [r, g, b];
}

function disposeMesh(mesh) {
  if (mesh.geometry) mesh.geometry.dispose();
  if (mesh.material) {
    if (Array.isArray(mesh.material)) mesh.material.forEach(m => m.dispose());
    else mesh.material.dispose();
  }
}

// ═══════════════════ Highlight / Selection ═══════════════════
// Vertex-color-based highlight: modify original mesh colors, no overlay geometry
function highlightFaceGroups(faceIds, color) {
  clearHighlights();
  if (!S.modelMeshes || S.modelMeshes.length === 0 || faceIds.size === 0) return;
  const faceSet = new Set(faceIds);
  const hc = new THREE.Color(color);

  for (const mesh of S.modelMeshes) {
    const geom = mesh.geometry;
    const fgMap = geom.userData.faceGroupMap;
    const colorAttr = geom.getAttribute('color');
    if (!fgMap || !colorAttr) continue;

    if (!geom.userData.origColors) {
      geom.userData.origColors = new Float32Array(colorAttr.array);
    }
    colorAttr.array.set(geom.userData.origColors);

    const indexAttr = geom.index;
    const faceCount = indexAttr ? indexAttr.count / 3 : geom.getAttribute('position').count / 3;

    for (let i = 0; i < faceCount; i++) {
      if (!faceSet.has(fgMap[i])) continue;
      const i0 = indexAttr ? indexAttr.getX(i * 3) : i * 3;
      const i1 = indexAttr ? indexAttr.getX(i * 3 + 1) : i * 3 + 1;
      const i2 = indexAttr ? indexAttr.getX(i * 3 + 2) : i * 3 + 2;
      for (const vi of [i0, i1, i2]) {
        colorAttr.setXYZ(vi,
          colorAttr.getX(vi) * 0.4 + hc.r * 0.6,
          colorAttr.getY(vi) * 0.4 + hc.g * 0.6,
          colorAttr.getZ(vi) * 0.4 + hc.b * 0.6);
      }
    }
    colorAttr.needsUpdate = true;
  }
}

function clearHighlights() {
  if (S.modelMeshes) {
    for (const mesh of S.modelMeshes) {
      const ca = mesh.geometry.getAttribute('color');
      if (ca && mesh.geometry.userData.origColors) {
        ca.array.set(mesh.geometry.userData.origColors);
        ca.needsUpdate = true;
      }
    }
  }
  for (const m of S.highlightMeshes) { disposeMesh(m); modelGroup.remove(m); }
  S.highlightMeshes = [];
}

function updateAllHighlights() {
  applyCompositeHighlights();
}

function applyCompositeHighlights() {
  if (!S.modelMeshes) return;
  for (const mesh of S.modelMeshes) {
    const geom = mesh.geometry;
    const fgMap = geom.userData.faceGroupMap;
    const colorAttr = geom.getAttribute('color');
    if (!fgMap || !colorAttr) continue;
    if (!geom.userData.origColors) geom.userData.origColors = new Float32Array(colorAttr.array);
    colorAttr.array.set(geom.userData.origColors);
    const indexAttr = geom.index;
    for (let i = 0; i < fgMap.length; i++) {
      const faceId = fgMap[i];
      const boundary = S.boundaries[faceId];
      const color = S.selectedFaces.has(faceId)
        ? new THREE.Color(0x00ff66)
        : boundary ? new THREE.Color(getBoundaryColor(boundary.type)) : null;
      if (!color) continue;
      const vertices = indexAttr
        ? [indexAttr.getX(i * 3), indexAttr.getX(i * 3 + 1), indexAttr.getX(i * 3 + 2)]
        : [i * 3, i * 3 + 1, i * 3 + 2];
      for (const vertex of vertices) {
        colorAttr.setXYZ(
          vertex,
          colorAttr.getX(vertex) * 0.35 + color.r * 0.65,
          colorAttr.getY(vertex) * 0.35 + color.g * 0.65,
          colorAttr.getZ(vertex) * 0.35 + color.b * 0.65
        );
      }
    }
    colorAttr.needsUpdate = true;
  }
}

function getBoundaryColor(type) {
  const map = {
    inlet: 0x3299f7, outlet: 0xf0463a, wall: 0x6e7681,
    heat_source: 0xd97706, symmetry: 0x8b5cf6, open: 0x22c55e,
  };
  return map[type] || 0x555555;
}

function getBoundaryColorHex(type) {
  const map = {
    inlet: '#3299f7', outlet: '#f0463a', wall: '#6e7681',
    heat_source: '#d97706', symmetry: '#8b5cf6', open: '#22c55e',
  };
  return map[type] || '#555555';
}

// ═══════════════════ Mouse Interaction ═══════════════════
container.addEventListener('mousemove', onMouseMove);
container.addEventListener('click', onMouseClick);

function getFaceGroupFromIntersect(intersect) {
  const faceIndex = intersect.faceIndex;
  const obj = intersect.object;
  if (!obj.userData.isModel) return null;
  const fgMap = obj.geometry.userData.faceGroupMap;
  if (!fgMap || faceIndex >= fgMap.length) return null;
  return fgMap[faceIndex];
}

function onMouseMove(event) {
  const rect = container.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  if (!S.modelMeshes || S.modelMeshes.length === 0) return;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(S.modelMeshes, false);

  const tooltip = document.getElementById('tooltip');
  if (intersects.length > 0) {
    const fgId = getFaceGroupFromIntersect(intersects[0]);
    if (fgId !== null) {
      const fg = S.faceGroups.find(f => f.face_id === fgId);
      if (fg) {
        let status = '';
        if (S.selectedFaces.has(fgId)) status = ' [已选中]';
        if (S.boundaries[fgId]) status += ` [${S.boundaries[fgId].type.toUpperCase()}]`;

        tooltip.style.display = 'block';
        tooltip.style.left = (event.clientX - rect.left + 16) + 'px';
        tooltip.style.top = (event.clientY - rect.top - 36) + 'px';
        tooltip.textContent = `Face #${fgId}  |  ${fg.area.toFixed(3)} m²  |  ${fg.face_type}${status}`;
        return;
      }
    }
  }
  tooltip.style.display = 'none';
}

function onMouseClick(event) {
  if (!S.modelMeshes || S.modelMeshes.length === 0) return;

  const rect = container.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(S.modelMeshes, false);

  if (intersects.length > 0) {
    const fgId = getFaceGroupFromIntersect(intersects[0]);
    if (fgId !== null) {
      toggleFaceSelection(fgId, event.shiftKey);
    }
  }
}

// ═══════════════════ Face Selection ═══════════════════
function toggleFaceSelection(faceId, additive) {
  if (S.selectedFaces.has(faceId)) {
    S.selectedFaces.delete(faceId);
  } else {
    if (!additive) S.selectedFaces.clear();
    S.selectedFaces.add(faceId);
  }
  updateAllHighlights();
  updateFaceList();
  updateBoundaryForm();
}

function clearSelection() {
  S.selectedFaces.clear();
  updateAllHighlights();
  updateFaceList();
  updateBoundaryForm();
}

window.toggleFaceSelectionById = function(faceId, clickEvent) {
  toggleFaceSelection(faceId, Boolean(clickEvent && clickEvent.shiftKey));
};

// ═══════════════════ View Presets ═══════════════════
window.setView = function(view) {
  if (!S.modelMeshes || S.modelMeshes.length === 0) return;
  const box = new THREE.Box3();
  for (const m of S.modelMeshes) box.expandByObject(m);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const d = Math.max(size.x, size.y, size.z) * 2;

  const views = {
    front:  [center.x, center.y, center.z + d],
    back:   [center.x, center.y, center.z - d],
    top:    [center.x, center.y + d, center.z],
    bottom: [center.x, center.y - d, center.z],
    left:   [center.x - d, center.y, center.z],
    right:  [center.x + d, center.y, center.z],
    iso:    [center.x + d*0.6, center.y + d*0.5, center.z + d*0.6],
  };

  const pos = views[view] || views.iso;
  camera.position.set(...pos);
  controls.target.copy(center);
  controls.update();
};

// ═══════════════════ UI Updates ═══════════════════
function updateStats(box, size, numGroups) {
  const facesEl = document.getElementById('stat-faces');
  const groupsEl = document.getElementById('stat-groups');
  const sizeEl = document.getElementById('stat-size');
  if (facesEl) facesEl.textContent = (S.totalTriangles || 0).toLocaleString();
  if (groupsEl) groupsEl.textContent = numGroups;
  if (sizeEl) sizeEl.textContent = `${size.x.toFixed(3)} x ${size.y.toFixed(3)} x ${size.z.toFixed(3)} m`;
  const dot = document.getElementById('status-dot');
  if (dot) dot.className = 'dot connected';
}

function updateFaceList() {
  const listEl = document.getElementById('face-list');
  const search = document.getElementById('face-search').value.toLowerCase();

  let filtered = S.faceGroups;
  if (search) {
    filtered = S.faceGroups.filter(fg =>
      String(fg.face_id).includes(search) ||
      fg.face_type.includes(search) ||
      String(fg.area).includes(search)
    );
  }

  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="empty">没有匹配的面</div>';
    return;
  }

  listEl.innerHTML = filtered.map(fg => {
    const selected = S.selectedFaces.has(fg.face_id);
    const bnd = S.boundaries[fg.face_id];
    const [r, g, b] = getFaceColor(fg.face_id, S.faceGroups.length);
    const colorStr = `rgb(${r},${g},${b})`;

    let bndBadge = '';
    if (bnd) {
      bndBadge = `<span class="badge" style="color:${getBoundaryColorHex(bnd.type)};background:rgba(${r},${g},${b},0.2);">${bnd.type}</span>`;
    }

    return `
      <div class="face-row${selected ? ' selected' : ''}"
           onclick="window.toggleFaceSelectionById(${fg.face_id}, event)">
        <span class="swatch" style="background:${colorStr}"></span>
        <span class="id">#${fg.face_id}</span>
        <span class="info">${fg.face_type}</span>
        ${bndBadge}
        <span class="area">${fg.area.toFixed(3)} m²</span>
      </div>
    `;
  }).join('');

  document.getElementById('face-search').disabled = false;
}

function updateBoundaryForm() {
  const form = document.getElementById('boundary-form');
  const label = document.getElementById('selected-label');

  if (S.selectedFaces.size === 0) {
    form.classList.remove('active');
    label.classList.remove('active');
    return;
  }

  form.classList.add('active');
  label.classList.add('active');

  const ids = [...S.selectedFaces];
  const names = ids.map(id => {
    const fg = S.faceGroups.find(f => f.face_id === id);
    return fg ? `#${id} (${fg.area.toFixed(3)} m²)` : `#${id}`;
  });
  label.textContent = `已选中 ${ids.length} 个面: ${names.join(', ')}`;

  // Pre-fill from first boundary if exists
  const first = S.boundaries[ids[0]];
  document.getElementById('bnd-type').value = first ? first.type : 'inlet';
  document.getElementById('bnd-label').value = first ? (first.label || '') : '';
}

function updateAssignedList() {
  const listEl = document.getElementById('assigned-list');
  const entries = Object.entries(S.boundaries);

  if (entries.length === 0) {
    listEl.innerHTML = '<div class="empty">No boundaries assigned</div>';
    return;
  }

  listEl.innerHTML = entries.map(([faceId, bnd]) => {
    const fg = S.faceGroups.find(f => f.face_id === parseInt(faceId));
    const area = fg ? fg.area.toFixed(3) : '?';
    return `
      <div class="bnd-item">
        <span class="dot" style="background:${getBoundaryColorHex(bnd.type)}"></span>
        <span class="info">
          <strong>${escapeHtml(bnd.type)}</strong> ${escapeHtml(bnd.label || '')}
          <span style="color:var(--text-dim);font-size:11px;"> Face #${faceId}</span>
        </span>
        <span style="color:var(--text-dim);font-size:11px;flex-shrink:0;">${area} m²</span>
        <span class="remove" onclick="removeBoundary(${faceId})" title="Remove">×</span>
      </div>
    `;
  }).join('');
}

// ═══════════════════ Boundaries ═══════════════════
window.applyBoundary = function() {
  const type = document.getElementById('bnd-type').value;
  const label = document.getElementById('bnd-label').value;

  if (!type || S.selectedFaces.size === 0) return;

  for (const faceId of S.selectedFaces) {
    S.boundaries[faceId] = {
      type,
      label: label || `${type}_${faceId}`,
    };
  }

  updateAllHighlights();
  updateFaceList();
  updateAssignedList();
  toast(`已应用 "${type}" 到 ${S.selectedFaces.size} 个面`, 'success');
};

window.removeBoundary = function(faceId) {
  delete S.boundaries[faceId];
  S.selectedFaces.delete(faceId);
  updateAllHighlights();
  updateFaceList();
  updateAssignedList();
  updateBoundaryForm();
};

window.clearSelection = clearSelection;

// ═══════════════════ Export ═══════════════════
window.exportConfig = function() {
  const config = {
    model_id: S.modelId,
    file_name: document.getElementById('filename').textContent || 'unknown',
    boundaries: {},
    summary: {
      total_face_groups: S.faceGroups.length,
      assigned_count: Object.keys(S.boundaries).length,
    },
  };

  for (const [faceId, bnd] of Object.entries(S.boundaries)) {
    const fg = S.faceGroups.find(f => f.face_id === parseInt(faceId));
    config.boundaries[faceId] = {
      type: bnd.type,
      label: bnd.label,
      area: fg ? fg.area : null,
      centroid: fg ? fg.centroid : null,
      normal: fg ? fg.normal : null,
      face_type: fg ? fg.face_type : null,
    };
  }

  const output = document.getElementById('export-json');
  output.style.display = 'block';
  output.textContent = JSON.stringify(config, null, 2);

  // Auto-download
  const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `boundaries_${S.modelId}.json`;
  a.click();
  URL.revokeObjectURL(url);

  toast('配置已导出!', 'success');
};

window.resetAll = function() {
  S.selectedFaces.clear();
  S.boundaries = {};
  clearHighlights();
  updateFaceList();
  updateAssignedList();
  updateBoundaryForm();
  document.getElementById('export-json').style.display = 'none';
  toast('已重置', 'success');
};

// ═══════════════════ Toast ═══════════════════
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type || '';
  el.classList.add('show');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.classList.remove('show'), 2500);
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[char]);
}

// ═══════════════════ File Upload ═══════════════════
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');
const loadingEl = document.getElementById('loading');

dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) uploadFile(e.target.files[0]);
});

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag');
  if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
});

async function uploadFile(file) {
  const filenameEl = document.getElementById('filename');
  filenameEl.textContent = file.name;
  filenameEl.style.display = 'block';
  loadingEl.classList.add('active');

  const formData = new FormData();
  formData.append('file', file);

  try {
    const resp = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await resp.json();

    if (!data.success) {
      throw new Error(data.detail || 'Upload failed');
    }

    await loadModel(data.glb_url, data.model_id, data.summary.face_groups);
    fetchModelList();

  } catch (err) {
    console.error(err);
    toast('上传失败: ' + err.message, 'error');
  } finally {
    loadingEl.classList.remove('active');
  }
}

// ═══════════════════ Model List Management ═══════════════════
async function fetchModelList() {
  try {
    const resp = await fetch('/api/models');
    const data = await resp.json();
    renderModelList(data.models || []);
  } catch (err) {
    console.error('Failed to fetch model list:', err);
  }
}

function renderModelList(models) {
  const container = document.getElementById('model-list');
  if (models.length === 0) {
    container.innerHTML = '<div class="empty">暂无已加载的模型</div>';
    return;
  }

  container.innerHTML = models.map(m => {
    const active = S.modelId === m.model_id ? ' active' : '';
    const ext = m.extents ? m.extents.map(v => v.toFixed(2)).join(' x ') + ' m' : '';
    return `
      <div class="model-item${active}" onclick="loadExistingModel('${m.model_id}')">
        <span class="info">
          <div class="name" title="${escapeHtml(m.file_name)}">${escapeHtml(m.file_name)}</div>
          <div class="meta">${m.face_groups} 面组 &bull; ${m.face_count.toLocaleString()} 三角面 &bull; ${ext}</div>
        </span>
        <button class="btn-del" onclick="event.stopPropagation(); deleteModel('${m.model_id}')">删除</button>
      </div>
    `;
  }).join('');
}

async function loadExistingModel(modelId) {
  try {
    const infoResp = await fetch(`/api/model/${modelId}`);
    const summary = await infoResp.json();
    const glbUrl = `/static/${modelId}.glb`;
    await loadModel(glbUrl, modelId, summary.face_groups);
    renderModelList(await (await fetch('/api/models')).json().models);
    toast(`已加载: ${summary.file_name}`, 'success');
  } catch (err) {
    toast('加载失败: ' + err.message, 'error');
  }
}

async function deleteModel(modelId) {
  if (!confirm(`确定要删除模型 ${modelId} 吗？`)) return;
  try {
    await fetch(`/api/model/${modelId}`, { method: 'DELETE' });
    if (S.modelId === modelId) {
      // Clear current view
      while (modelGroup.children.length > 0) {
        disposeMesh(modelGroup.children[0]);
        modelGroup.remove(modelGroup.children[0]);
      }
      S.modelMesh = null;
      S.modelMeshes = [];
      S.modelId = null;
      S.faceGroups = [];
      S.selectedFaces.clear();
      S.boundaries = {};
      updateFaceList();
      updateAssignedList();
      updateBoundaryForm();
      document.getElementById('export-json').style.display = 'none';
    }
    toast('模型已删除', 'success');
    fetchModelList();
  } catch (err) {
    toast('删除失败: ' + err.message, 'error');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') clearSelection();
  if (e.key === 'f' && !e.ctrlKey && !e.metaKey) setView('front');
  if (e.key === 't' && !e.ctrlKey && !e.metaKey) setView('top');
  if (e.key === 'i' && !e.ctrlKey && !e.metaKey) setView('iso');
  if (e.key === 'r' && e.ctrlKey) { e.preventDefault(); resetAll(); }
});

console.log('3D Model Boundary Selector ready.');
</script>
</body>
</html>
