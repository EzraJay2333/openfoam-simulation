# OpenFOAM Solver Registry
# This file records known solver capabilities for matching during Step 6.
# It is informational — always verify against the installed environment.
# Status: validated | experimental | deprecated

schema_version: "2.0"

canonical_aliases:
  single-phase: single_phase
  density-topology: density_topology
  pressure-loss: pressure_loss
  boundary-displacement: boundary_displacement
  porosity-field: porosity_field
  blockage-field: blockage_field
  legacy-blockage-topology: legacy_blockage_topology
  2d-planar: 2d_planar
  2d-axisymmetric: 2d_axisymmetric
  openfoam.org: openfoam_org
  openfoam.com: openfoam_com

solvers:
  # === Incompressible Steady Primal ===
  simpleFoam:
    distribution: [openfoam_org, openfoam_com]
    first_version: "1.0"
    flow_regime: [steady, incompressible]
    physics: [single_phase, isothermal]
    turbulence: [laminar, RANS]
    geometry: [2d_planar, 2d_axisymmetric, 3d]
    optimisation_support: primal_only
    notes: "Workhorse steady incompressible solver. SIMPLE algorithm."
    status: validated

  porousSimpleFoam:
    distribution: [openfoam_org, openfoam_com]
    first_version: "1.0"
    flow_regime: [steady, incompressible]
    physics: [single_phase, isothermal, porous_media]
    turbulence: [laminar, RANS]
    geometry: [2d_planar, 2d_axisymmetric, 3d]
    optimisation_support: primal_only
    notes: "simpleFoam with Darcy-Forchheimer porous media. Can be used for Brinkman-penalized topology optimization with external optimizer."
    status: validated

  # === Incompressible Transient Primal ===
  pisoFoam:
    distribution: [openfoam_org, openfoam_com]
    first_version: "1.0"
    flow_regime: [transient, incompressible]
    physics: [single_phase, isothermal]
    turbulence: [laminar, RANS]
    geometry: [2d_planar, 2d_axisymmetric, 3d]
    optimisation_support: primal_only
    notes: "Transient solver using PISO algorithm."
    status: validated

  pimpleFoam:
    distribution: [openfoam_org, openfoam_com]
    first_version: "1.6"
    flow_regime: [transient, incompressible]
    physics: [single_phase, isothermal]
    turbulence: [laminar, RANS, LES, DES]
    geometry: [2d_planar, 2d_axisymmetric, 3d]
    optimisation_support: primal_only
    notes: "PIMPLE = PISO + SIMPLE. Larger timesteps than pisoFoam. Supports LES/DES."
    status: validated

  # === Incompressible Adjoint (Foundation) ===
  adjointShapeOptimizationFoam:
    distribution: [openfoam_org]
    first_version: "2.0"
    last_version: "12"
    flow_regime: [steady, incompressible]
    physics: [single_phase, isothermal]
    turbulence: [laminar]  # RANS adjoint not officially supported in Foundation version
    geometry: [3d]
    optimisation_support: shape
    support_level: native
    objectives: [pressure_loss, drag, uniformity]
    design_variables: [boundary_displacement]
    notes: "Foundation distribution only. Surface-based shape sensitivities. Laminar flow."
    status: validated

  adjointShapeOptimisationFoam:
    distribution: [openfoam_org]
    first_version: "13"
    flow_regime: [steady, incompressible]
    physics: [single_phase, isothermal]
    turbulence: [laminar, RANS]
    geometry: [3d]
    optimisation_support: legacy_blockage_topology
    support_level: runtime_detected
    objectives: [pressure_loss]
    design_variables: [blockage_field]
    constraints: []
    evidence_level: official_source
    limitations:
      - no_thermal_or_energy_adjoint
      - no_generic_objective_manager
      - no_generic_volume_constraint
      - no_pareto_multi_objective
    notes: >
      Foundation 13 legacy application. It updates a volumetric blockage coefficient
      and minimises total pressure loss. Runtime inspection decides whether the
      application is a binary, source-only, or missing; the registry does not assume
      installation state.
    status: experimental

  # === Incompressible Adjoint (OpenCFD - Modern) ===
  adjointOptimisationFoam:
    distribution: [openfoam_com]
    first_version: "1906"
    topology_first_version: "2312"
    flow_regime: [steady, incompressible]
    physics: [single_phase, isothermal]
    turbulence: [laminar, RANS]
    geometry: [2d_planar, 2d_axisymmetric, 3d]
    optimisation_support: [shape, density_topology]
    support_level: native
    objectives: [pressure_loss, drag, uniformity]
    design_variables: [boundary_displacement, porosity_field]
    multi_objective_support: scalarisation_requires_exact_version_evidence
    notes: >
      Shape optimisation exists from v1906. Native porosity and level-set topology
      optimisation is verified from v2312 for mono-fluid aerodynamic/isothermal
      cases. CHT adjoint capability and Pareto optimisation are not claimed without
      exact-version executable, source and tutorial evidence.
    status: experimental
    evidence_level: official_documentation

  # === Incompressible Adjoint (OpenCFD - Legacy) ===
  adjointShapeOptimizationFoam_com:
    distribution: [openfoam_com]
    first_version: "1912"
    last_version: "2112"
    flow_regime: [steady, incompressible]
    physics: [single_phase, isothermal]
    turbulence: [laminar, RANS]
    geometry: [3d]
    optimisation_support: shape
    support_level: native
    objectives: [pressure_loss, drag]
    design_variables: [boundary_displacement]
    notes: >
      Legacy ESI solver, superseded by adjointOptimisationFoam in v2206.
      Check -help to verify availability; may have been removed.
    status: deprecated

  # === Compressible ===
  rhoSimpleFoam:
    distribution: [openfoam_org, openfoam_com]
    first_version: "1.0"
    flow_regime: [steady, compressible]
    physics: [single_phase, isothermal]
    turbulence: [laminar, RANS]
    geometry: [2d_planar, 2d_axisymmetric, 3d]
    optimisation_support: primal_only
    notes: "Steady compressible solver. No native adjoint."
    status: validated

  rhoPimpleFoam:
    distribution: [openfoam_org, openfoam_com]
    first_version: "2.0"
    flow_regime: [transient, compressible]
    physics: [single_phase, isothermal]
    turbulence: [laminar, RANS, LES, DES]
    geometry: [2d_planar, 2d_axisymmetric, 3d]
    optimisation_support: primal_only
    notes: "Transient compressible solver. No native adjoint."
    status: validated

  # === Multiphase ===
  interFoam:
    distribution: [openfoam_org, openfoam_com]
    first_version: "1.0"
    flow_regime: [transient, incompressible]
    physics: [multiphase, isothermal, VOF]
    turbulence: [laminar, RANS, LES]
    geometry: [2d_planar, 3d]
    optimisation_support: none
    notes: "Two-phase incompressible (VOF). No native adjoint. External optimizer required."
    status: validated

  # === Heat Transfer ===
  chtMultiRegionFoam:
    distribution: [openfoam_org, openfoam_com]
    first_version: "2.0"
    flow_regime: [steady, transient, incompressible, compressible]
    physics: [single_phase, conjugate_heat_transfer]
    turbulence: [laminar, RANS]
    geometry: [2d_planar, 2d_axisymmetric, 3d]
    optimisation_support: external_only
    notes: "Multi-region conjugate heat transfer. Use an external optimizer unless a version-matched native adjoint capability is proven locally."
    status: validated

  buoyantSimpleFoam:
    distribution: [openfoam_org, openfoam_com]
    first_version: "1.6"
    flow_regime: [steady, compressible]  # weakly compressible
    physics: [single_phase, buoyancy, natural_convection]
    turbulence: [laminar, RANS]
    geometry: [2d_planar, 3d]
    optimisation_support: none
    notes: "Buoyancy-driven flow. No native adjoint."
    status: validated

  # === Custom/External Optimisation Patterns ===
  external_optimizer:
    distribution: [openfoam_org, openfoam_com]
    flow_regime: [steady, transient]
    physics: [any]
    optimisation_support: [shape, density_topology, parameter_sweep]
    support_level: external
    description: >
      Any OpenFOAM solver can be used with an external optimizer (DAKOTA, pyOptSparse,
      SciPy, custom Python). OpenFOAM evaluates primal (and optionally adjoint)
      objectives while the external tool updates design variables. Requires user
      to install and configure the external tool.
    status: validated

# === External Optimization Tools ===
external_tools:
  DAKOTA:
    type: optimization_framework
    url: "https://dakota.sandia.gov/"
    methods: [gradient-based, gradient-free, surrogate, multi-objective]
    interface: file-based (parameter files, results files)
    support_level: external

  pyOptSparse:
    type: python_optimization_library
    url: "https://mdolab-pyoptsparse.readthedocs-hosted.com/en/stable/"
    methods: [gradient-based, gradient-free, multi-objective]
    interface: Python API
    support_level: external

  scipy.optimize:
    type: python_optimization_library
    url: "https://docs.scipy.org/doc/scipy/reference/optimize.html"
    methods: [gradient-based, gradient-free]
    interface: Python API
    support_level: external
